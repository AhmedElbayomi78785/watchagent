services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - db_data:/app/data
    restart: unless-stopped

  poller:
    build: .
    command: python -m app.poller
    env_file:
      - .env
    volumes:
      - db_data:/app/data
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
